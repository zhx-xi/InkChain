name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Build Core (needed for E2E API server)
        run: pnpm --filter @actalk/inkchain-core build

      - name: Install Playwright browsers
        working-directory: packages/studio
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install chromium --with-deps

      - name: Start API server (background)
        working-directory: packages/studio
        env:
          INKCHAIN_STUDIO_PORT: "4581"
          INKCHAIN_AGENT_LLM_STUB: "1"
          INKCHAIN_PROJECT_ROOT: test-project
        run: |
          node_modules/.bin/tsx src/api/index.ts > /tmp/api-server.log 2>&1 &
          echo $! > /tmp/api-server.pid
          # Wait for API server to start listening
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:4581 | grep -q "2\|3\|4"; then
              echo "API server responding after ${i}s"
              break
            fi
            sleep 1
          done
          echo "=== API server log (last 10 lines) ==="
          tail -10 /tmp/api-server.log

      - name: Start Vite dev server (background)
        working-directory: packages/studio
        env:
          INKCHAIN_STUDIO_PORT: "4581"
        run: |
          node_modules/.bin/vite --host --port 4580 &
          echo $! > /tmp/vite-server.pid
          # Wait for Vite to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:4580 > /dev/null 2>&1; then
              echo "Vite ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run E2E — rename-smoke
        working-directory: packages/studio
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright test rename-smoke --config=playwright.ci.config.ts --reporter=list

      - name: Run E2E — agent-pipeline-view
        working-directory: packages/studio
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright test agent-pipeline-view --config=playwright.ci.config.ts --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/studio/playwright-report/
          retention-days: 3

      - name: Stop servers
        if: always()
        run: |
          kill $(cat /tmp/api-server.pid) 2>/dev/null || true
          kill $(cat /tmp/vite-server.pid) 2>/dev/null || true
