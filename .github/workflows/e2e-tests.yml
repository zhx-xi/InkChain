name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Build Core (needed for E2E API server)
        run: pnpm --filter @actalk/inkchain-core build

      - name: Install Playwright browsers
        working-directory: packages/studio
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: packages/studio
        env:
          INKCHAIN_E2E_PROJECT_ROOT: test-project
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright test

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/studio/playwright-report/
          retention-days: 7
