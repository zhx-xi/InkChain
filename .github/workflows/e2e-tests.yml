name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Build Core (needed for E2E API server)
        run: pnpm --filter @actalk/inkchain-core build

      - name: Install Playwright browsers
        working-directory: packages/studio
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install chromium --with-deps

      - name: Diagnostics — verify setup
        working-directory: packages/studio
        run: |
          echo "=== Node version ===" && node -v
          echo "=== tsx available ===" && npx tsx --version || echo "tsx not found via npx"
          echo "=== node_modules/.bin/tsx ===" && ls -la node_modules/.bin/tsx || echo "tsx not at .bin"
          echo "=== Playwright version ===" && npx playwright --version
          echo "=== Test project structure ===" && ls -la test-project/ && ls test-project/inkchain.json
          echo "=== Core dist ===" && ls ../core/dist/index.js || echo "Core dist missing!"

      - name: Run E2E tests (rename-critical only)
        working-directory: packages/studio
        env:
          INKCHAIN_E2E_PROJECT_ROOT: test-project
        # Skip language-selector (flaky 60s timeouts on CI) and style-*
        # (pre-existing LLM dependency failures)
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright test rename-smoke agent-pipeline-view

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/studio/playwright-report/
          retention-days: 3

      - name: Upload test-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: packages/studio/test-results/
          retention-days: 3
