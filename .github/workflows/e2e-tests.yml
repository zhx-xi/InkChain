name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # ── Rename smoke (must pass) ──
  rename:
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "rename-smoke"
      group-name: "Rename Smoke"

  # ── Language selector (flaky, non-blocking) ──
  language:
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "language-selector"
      group-name: "Language Selector"

  # ── Agent ──
  agent:
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "agent-team agent-team-core agent-hub-page agent-pipeline-view"
      group-name: "Agent Team"

  # ── Dashboard & Navigation ──
  dashboard:
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "dashboard project-root sidebar-navigation edit-dashboard"
      group-name: "Dashboard"

  # ── Book & Chapter ──
  book:
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "book-create book-detail book-style-page book-world-extract"
      group-name: "Book"

  chapter:
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "chapter-audit chapter-history-core chapter-reader chapter-versioning chapter-volume chapter-wizard edge-chapter-range"
      group-name: "Chapter"

  # ── Audit ──
  audit:
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "audit-context-popup audit-fix-button audit-page-core audit-volumes"
      group-name: "Audit"

  # ── Authoring ──
  authoring:
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "authoring authoring-confirm"
      group-name: "Authoring"

  # ── Timeline ──
  timeline:
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "timeline-column-spacing timeline-cross-role timeline-filter timeline-flow timeline-page-core"
      group-name: "Timeline"

  # ── Foreshadowing ──
  foreshadowing:
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "foreshadow-payoff foreshadowing-dynamic-chapters foreshadowing-flow foreshadowing-page-core foresight-pagination foresight-table"
      group-name: "Foreshadowing"

  # ── World ──
  world:
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "world-association world-extract-llm world-inheritance-page world-list-core world-map-core world-map"
      group-name: "World"

  # ── Style ──
  style:
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "style-chapter-range style-detection-core style-detection style-prescreen"
      group-name: "Style Detection"

  # ── Film ──
  film:
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "film-image film-list film-wizard"
      group-name: "Interactive Film"

  # ── Skill Library ──
  skill:
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "skill-library skill-library-core builtin-skill-edit"
      group-name: "Skills"

  # ── Flow & Relation ──
  flow:
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "flow flow-editor flow-screenshot relation-graph relation-graph-core"
      group-name: "Flow & Relations"

  # ── Remaining misc specs ──
  misc:
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "analysis consistency-check-panel export import-manager log-viewer log-viewer-508 player service-list-page session-archive genre-manager character-tiering validation cross-feature radar-view radar-view-510 truth-files volume-dnd daemon-control doctor-view build-verification project-settings issue-394-world-association issue-406-timeline-filter issue-410-audit-cache issue-413-audit-context issue-421-builtin-skill-edit"
      group-name: "Misc (gen/import/export/radar/etc)"
