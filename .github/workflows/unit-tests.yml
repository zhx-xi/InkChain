name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: unit-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  core:
    name: Core (packages/core)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Run Core tests
        working-directory: packages/core
        run: pnpm exec vitest run

  cli:
    name: CLI (packages/cli)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Build CLI
        working-directory: packages/cli
        run: pnpm run build

      - name: Run CLI tests
        working-directory: packages/cli
        # publish-package.test.ts requires publishable packages; skip on CI
        run: pnpm exec vitest run --passWithNoTests --exclude '**/publish-package.test.ts'

  studio:
    name: Studio (packages/studio)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Run Studio unit tests
        working-directory: packages/studio
        # Skip pre-existing failures that need Agent Team DOM or Zod migration fixes
        # TODO(#581): fix these tests
        run: pnpm exec vitest run --exclude '**/ProjectSettings.test.tsx' --exclude '**/foreshadowing.test.ts' --exclude '**/skills.test.ts'
