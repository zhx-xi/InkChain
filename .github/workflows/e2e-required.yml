name: E2E Required

# Gatekeeper: must pass for merge.  Only runs the rename smoke
# and language selector X tests that are stable and verify the
# app boots correctly.  Other E2E groups run in e2e-optional.yml
# and do not block PRs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-req-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-core:
    name: Build Core (shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @inkchain/inkchain-core build
      - uses: actions/upload-artifact@v6
        with:
          name: core-dist
          path: packages/core/dist/

  rename:
    needs: [build-core]
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "rename-smoke"
      group-name: "Rename Smoke"

  language:
    needs: [build-core]
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "language-selector"
      group-name: "Language Selector"