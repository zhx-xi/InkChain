name: E2E Optional

# Informational only — does NOT block PRs.
# Jobs are triggered by path filters: only run when relevant files change.
# On push to main, all groups run for full validation.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-opt-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # ── Detect what changed ──────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      book: ${{ steps.filter.outputs.book }}
      chapter: ${{ steps.filter.outputs.chapter }}
      audit: ${{ steps.filter.outputs.audit }}
      authoring: ${{ steps.filter.outputs.authoring }}
      timeline: ${{ steps.filter.outputs.timeline }}
      foreshadowing: ${{ steps.filter.outputs.foreshadowing }}
      world: ${{ steps.filter.outputs.world }}
      style: ${{ steps.filter.outputs.style }}
      film: ${{ steps.filter.outputs.film }}
      skill: ${{ steps.filter.outputs.skill }}
      flow: ${{ steps.filter.outputs.flow }}
      misc-data: ${{ steps.filter.outputs.misc-data }}
      misc-pages: ${{ steps.filter.outputs.misc-pages }}
      misc-views: ${{ steps.filter.outputs.misc-views }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # needed by dorny/paths-filter for PR diff
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            # Core is shared by everything — any core change triggers all
            core:
              - 'packages/core/**'
              - 'packages/studio/vitest.config.ts'
              - 'packages/studio/playwright.config.ts'
              - 'packages/studio/playwright.ci.config.ts'
              - 'packages/studio/e2e/global-setup.ts'
              - 'packages/studio/e2e/fixtures/**'
            agent:
              - 'packages/core/**'
              - 'packages/studio/src/components/Agent*/**'
              - 'packages/studio/src/api/routes/agent*'
              - 'packages/studio/e2e/agent*'
            dashboard:
              - 'packages/core/**'
              - 'packages/studio/src/components/Sidebar.*'
              - 'packages/studio/src/pages/Dashboard*'
              - 'packages/studio/src/App.tsx'
              - 'packages/studio/e2e/dashboard*'
              - 'packages/studio/e2e/sidebar*'
              - 'packages/studio/e2e/project-root*'
              - 'packages/studio/e2e/edit-dashboard*'
            book:
              - 'packages/core/**'
              - 'packages/studio/src/pages/Book*'
              - 'packages/studio/src/api/book-create*'
              - 'packages/studio/e2e/book*'
            chapter:
              - 'packages/core/**'
              - 'packages/studio/src/pages/Chapter*'
              - 'packages/studio/src/components/chapter/**'
              - 'packages/studio/e2e/chapter*'
              - 'packages/studio/e2e/edge-chapter*'
              - '!packages/studio/e2e/chapter-baseline*'
            audit:
              - 'packages/core/**'
              - 'packages/studio/src/pages/Audit*'
              - 'packages/studio/src/components/audit/**'
              - 'packages/studio/src/api/routes/audit*'
              - 'packages/studio/e2e/audit*'
            authoring:
              - 'packages/core/**'
              - 'packages/studio/src/pages/ChatPage*'
              - 'packages/studio/src/api/routes/writing-continue*'
              - 'packages/studio/e2e/authoring*'
            timeline:
              - 'packages/core/**'
              - 'packages/studio/src/pages/Timeline*'
              - 'packages/studio/src/api/routes/timeline*'
              - 'packages/studio/e2e/timeline*'
            foreshadowing:
              - 'packages/core/**'
              - 'packages/studio/src/pages/Foreshadowing*'
              - 'packages/studio/src/api/routes/foreshadowing*'
              - 'packages/studio/e2e/foreshadow*'
              - 'packages/studio/e2e/foresight*'
              - '!packages/studio/e2e/foreshadowing-baseline*'
              - '!packages/studio/e2e/foreshadowing-delete*'
            world:
              - 'packages/core/**'
              - 'packages/studio/src/pages/World*'
              - 'packages/studio/src/api/routes/worlds*'
              - 'packages/studio/src/api/routes/maps*'
              - 'packages/studio/src/components/world-editor/**'
              - 'packages/studio/e2e/world*'
              - '!packages/studio/e2e/world-baseline*'
              - '!packages/studio/e2e/world-create-validation*'
            style:
              - 'packages/core/**'
              - 'packages/studio/src/api/routes/style*'
              - 'packages/studio/src/api/routes/consistency*'
              - 'packages/studio/src/pages/Consistency*'
              - 'packages/studio/e2e/style*'
            film:
              - 'packages/core/**'
              - 'packages/studio/src/pages/Film*'
              - 'packages/studio/src/pages/StoryPlayer*'
              - 'packages/studio/src/pages/StoryGraph*'
              - 'packages/studio/e2e/film*'
            skill:
              - 'packages/core/**'
              - 'packages/studio/src/components/Skill*'
              - 'packages/studio/src/api/routes/skills*'
              - 'packages/studio/src/pages/Skill*'
              - 'packages/studio/e2e/skill*'
              - 'packages/studio/e2e/builtin*'
            flow:
              - 'packages/core/**'
              - 'packages/studio/src/pages/Flow*'
              - 'packages/studio/src/store/relations/**'
              - 'packages/studio/src/lib/story*'
              - 'packages/studio/e2e/flow*'
              - 'packages/studio/e2e/relation*'
            misc-data:
              - 'packages/core/**'
              - 'packages/studio/src/api/routes/**'
              - 'packages/studio/e2e/analysis*'
              - 'packages/studio/e2e/export*'
              - 'packages/studio/e2e/import*'
              - 'packages/studio/e2e/index-manager*'
              - 'packages/studio/e2e/cross-feature*'
              - 'packages/studio/e2e/api-path*'
              - 'packages/studio/e2e/build*'
              - 'packages/studio/e2e/consistency-check*'
            misc-pages:
              - 'packages/core/**'
              - 'packages/studio/src/api/routes/**'
              - 'packages/studio/e2e/player*'
              - 'packages/studio/e2e/service*'
              - 'packages/studio/e2e/session*'
              - 'packages/studio/e2e/genre*'
              - 'packages/studio/e2e/character*'
              - 'packages/studio/e2e/validation*'
              - 'packages/studio/e2e/daemon*'
              - 'packages/studio/e2e/doctor*'
              - 'packages/studio/e2e/project-settings*'
              - 'packages/studio/e2e/truth*'
              - 'packages/studio/e2e/volume*'
            misc-views:
              - 'packages/core/**'
              - 'packages/studio/src/api/routes/**'
              - 'packages/studio/e2e/log-viewer*'
              - 'packages/studio/e2e/radar*'
              - 'packages/studio/e2e/issue*'

  # ── Build Core once, share across all E2E jobs ────────────────
  build-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @inkchain/inkchain-core build
      - uses: actions/upload-artifact@v6
        with:
          name: core-dist
          path: packages/core/dist/

  # ── E2E groups (conditionally triggered) ────────────────────────
  # On push to main: always runs. On PR: only when relevant files changed.

  agent:
    needs: [changes, build-core]
    if: needs.changes.outputs.agent == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "agent-team agent-team-core agent-hub-page agent-pipeline-view agent-edit-functionality"
      group-name: "Agent Team"

  dashboard:
    needs: [changes, build-core]
    if: needs.changes.outputs.dashboard == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "dashboard project-root sidebar-navigation sidebar-link-navigation edit-dashboard dashboard-collapse-resize"
      group-name: "Dashboard"

  book:
    needs: [changes, build-core]
    if: needs.changes.outputs.book == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "book-create book-detail book-style-page book-world-extract"
      group-name: "Book"

  chapter:
    needs: [changes, build-core]
    if: needs.changes.outputs.chapter == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "chapter-audit chapter-history-core chapter-reader chapter-versioning chapter-volume chapter-wizard edge-chapter-range"
      group-name: "Chapter"

  audit:
    needs: [changes, build-core]
    if: needs.changes.outputs.audit == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "audit-context-popup audit-fix-button audit-page-core audit-volumes audit-entry-refactor"
      group-name: "Audit"

  authoring:
    needs: [changes, build-core]
    if: needs.changes.outputs.authoring == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "authoring authoring-confirm"
      group-name: "Authoring"

  timeline:
    needs: [changes, build-core]
    if: needs.changes.outputs.timeline == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "timeline-column-spacing timeline-cross-role timeline-filter timeline-flow timeline-page-core"
      group-name: "Timeline"

  foreshadowing:
    needs: [changes, build-core]
    if: needs.changes.outputs.foreshadowing == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "foreshadow-payoff foreshadowing-dynamic-chapters foreshadowing-flow foreshadowing-page-core foreshadowing-data-integrity foresight-pagination foresight-table"
      group-name: "Foreshadowing"

  world:
    needs: [changes, build-core]
    if: needs.changes.outputs.world == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "world-association world-extract-llm world-extract-book-error world-inheritance-page world-list-core world-map-core world-map"
      group-name: "World"

  style:
    needs: [changes, build-core]
    if: needs.changes.outputs.style == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "style-chapter-range style-detection-core style-detection style-prescreen"
      group-name: "Style Detection"

  film:
    needs: [changes, build-core]
    if: needs.changes.outputs.film == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "film-image film-list film-wizard"
      group-name: "Interactive Film"

  skill:
    needs: [changes, build-core]
    if: needs.changes.outputs.skill == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "skill-library skill-library-core builtin-skill-edit skill-bind-api"
      group-name: "Skills"

  flow:
    needs: [changes, build-core]
    if: needs.changes.outputs.flow == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "flow flow-editor flow-screenshot relation-graph relation-graph-core"
      group-name: "Flow & Relations"

  misc-data:
    needs: [changes, build-core]
    if: needs.changes.outputs.misc-data == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "analysis consistency-check-panel export import-manager index-manager cross-feature build-verification api-path-smoke"
      group-name: "Misc — Data"

  misc-pages:
    needs: [changes, build-core]
    if: needs.changes.outputs.misc-pages == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "player service-list-page session-archive genre-manager character-tiering validation daemon-control doctor-view project-settings truth-files volume-dnd"
      group-name: "Misc — Pages"

  misc-views:
    needs: [changes, build-core]
    if: needs.changes.outputs.misc-views == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/e2e-spec.yml
    with:
      spec: "log-viewer log-viewer-508 radar-view radar-view-510 world-association timeline-filter audit-cache audit-context builtin-skill-edit"
      group-name: "Misc — Views"
