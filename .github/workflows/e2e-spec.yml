name: E2E Spec Runner

on:
  workflow_call:
    inputs:
      spec:
        required: true
        type: string
        description: "Playwright spec pattern, e.g. 'rename-smoke' or 'agent-*'"
      group-name:
        required: true
        type: string
        description: "Human-readable name for this group"

jobs:
  run:
    name: ${{ inputs.group-name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Download core build artifact
        uses: actions/download-artifact@v6
        with:
          name: core-dist
          path: packages/core/dist/
      - name: Install Playwright browsers
        working-directory: packages/studio
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install chromium --with-deps
      - name: Prepare test project (inkchain.json)
        working-directory: packages/studio
        run: |
          mkdir -p test-project
          cat > test-project/inkchain.json << 'EOF'
          {
            "name": "E2E Test Project",
            "version": "0.1.0",
            "language": "zh",
            "llm": {
              "provider": "openai",
              "service": "custom",
              "configSource": "env",
              "baseUrl": "http://localhost:11434/v1",
              "apiKey": "",
              "model": "gpt-4o-mini",
              "temperature": 0.7,
              "thinkingBudget": 0,
              "apiFormat": "chat",
              "stream": true
            }
          }
          EOF
          mkdir -p test-project/.inkchain/skills
          cat > test-project/.inkchain/skills/custom-style-check.json << 'SKILL_EOF'
          {
            "id": "custom-style-check",
            "category": "writing",
            "enabled": true,
            "description": "自定义文风检测：检查章节是否符合已设定的风格指南",
            "triggers": [{"type": "condition", "condition": "true"}],
            "injection": {"mode": "append", "target": "system_prompt", "priority": 50},
            "params": {},
            "prompt": "请检查以下文本是否符合用户定义的目标文风。"
          }
          SKILL_EOF
          cat > test-project/.inkchain/skills/world-rules-auditor.json << 'SKILL_EOF'
          {
            "id": "world-rules-auditor",
            "category": "world",
            "enabled": false,
            "description": "世界规则审计：验证新章节是否与世界设定中的规则一致",
            "triggers": [{"type": "condition", "condition": "true"}],
            "injection": {"mode": "append", "target": "system_prompt", "priority": 60},
            "params": {},
            "prompt": "请审核以下内容是否违反已建立的世界规则。"
          }
          SKILL_EOF
          cat > test-project/.inkchain/skills/character-consistency-check.json << 'SKILL_EOF'
          {
            "id": "character-consistency-check",
            "category": "character",
            "enabled": true,
            "description": "角色一致性检查：确保角色行为与性格设定一致",
            "triggers": [{"type": "condition", "condition": "true"}],
            "injection": {"mode": "append", "target": "system_prompt", "priority": 55},
            "params": {},
            "prompt": "请检查角色行为是否符合其性格设定。"
          }
          SKILL_EOF
          cat > test-project/.inkchain/skills/plot-hole-detector.json << 'SKILL_EOF'
          {
            "id": "plot-hole-detector",
            "category": "analysis",
            "enabled": true,
            "description": "情节漏洞检测：识别时间线矛盾、逻辑断裂等情节问题",
            "triggers": [{"type": "condition", "condition": "true"}],
            "injection": {"mode": "prepend", "target": "user_prompt", "priority": 70},
            "params": {},
            "prompt": "请分析以下文本，找出可能的情节漏洞。"
          }
          SKILL_EOF
          cat > test-project/.inkchain/skills/batch-summarizer.json << 'SKILL_EOF'
          {
            "id": "batch-summarizer",
            "category": "utility",
            "enabled": false,
            "description": "批量摘要工具：将多章节内容压缩为摘要",
            "triggers": [{"type": "manual"}],
            "injection": {"mode": "append", "target": "system_prompt", "priority": 40},
            "params": {},
            "prompt": "请将以下内容压缩为简洁的摘要。"
          }
          SKILL_EOF
          # Verify seed files were created
          echo "=== Skills seed files ==="
          ls -la test-project/.inkchain/skills/
          # Also create in .inkos/ for API artifact compatibility
          mkdir -p test-project/.inkos/skills
          cp test-project/.inkchain/skills/*.json test-project/.inkos/skills/
          ls -la test-project/.inkos/skills/
      - name: Start API server
        working-directory: packages/studio
        env:
          INKCHAIN_STUDIO_PORT: "4581"
          INKCHAIN_AGENT_LLM_STUB: "1"
          INKCHAIN_PROJECT_ROOT: test-project
        run: |
          node_modules/.bin/tsx src/api/index.ts > /tmp/api-server.log 2>&1 &
          echo $! > /tmp/api-server.pid
          sleep 30
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:4581 | grep -q "2\|3\|4"; then
              echo "API ready after ${i}s"
              break
            fi
            sleep 1
          done
      - name: Start Vite dev server
        working-directory: packages/studio
        env:
          INKCHAIN_STUDIO_PORT: "4581"
        run: |
          node_modules/.bin/vite --host --port 4580 &
          echo $! > /tmp/vite-server.pid
          for i in $(seq 1 30); do
            if curl -s http://localhost:4580 > /dev/null 2>&1; then
              echo "Vite ready after ${i}s"
              break
            fi
            sleep 1
          done
      - name: Run ${{ inputs.group-name }} tests
        working-directory: packages/studio
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright test ${{ inputs.spec }} --config=playwright.ci.config.ts --reporter=list
      - name: Stop servers
        if: always()
        run: |
          kill $(cat /tmp/api-server.pid) 2>/dev/null || true
          kill $(cat /tmp/vite-server.pid) 2>/dev/null || true